<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Account - VITMaps</title>

    <!-- KEEP GLOBAL CSS -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/main.css">

    <!-- ICONS -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
/* ===== PAGE SCOPED STYLES (SAFE — WON’T BREAK NAVBAR) ===== */

.account-page {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: #e2e8f0;
    position: relative;
    overflow-x: hidden;

    background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
}

/* glow */
.account-page::after {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 30%, rgba(56,189,248,0.25), transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(99,102,241,0.2), transparent 40%),
        radial-gradient(circle at 50% 80%, rgba(236,72,153,0.15), transparent 40%);
    z-index: -2;
}

/* texture */
.account-page::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background-image:
        repeating-radial-gradient(circle at 0 0, rgba(255,255,255,0.04) 0px, transparent 1px),
        repeating-radial-gradient(circle at 25px 25px, rgba(0,0,0,0.04) 0px, transparent 1px);
    background-size: 50px 50px;
    opacity: 0.4;
}

/* container */
.account-page .account-container {
    width: 75%;
    margin: 40px auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* cards */
.account-page .card {
    background: rgba(255, 255, 255, 0.12);
    border-radius: 18px;
    padding: 25px;
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    transition: 0.25s;
}

.account-page .card:hover {
    transform: translateY(-4px);
}

/* headings */
.account-page h2 {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    color: #f1f5f9;
}

/* text */
.account-page p {
    color: #cbd5e1;
}

/* empty state */
.account-page .empty {
    text-align: center;
    padding: 20px;
    color: #94a3b8;
}

/* locations */
.account-page .location-item {
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    background: rgba(255,255,255,0.18);

    display: flex;
    justify-content: space-between;
    align-items: center;
}

.account-page .location-info {
    display: flex;
    flex-direction: column;
}

.account-page .location-item strong {
    color: white;
}

.account-page .btn-group {
    display: flex;
    gap: 6px;
}

.account-page .location-item button {
    padding: 6px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;

    background: rgba(255,255,255,0.25);
    color: white;
}

.account-page .location-item button:hover {
    background: #38bdf8;
    color: #0f172a;
}

/* logout */
.account-page .logout-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #ef4444, #dc2626);
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.account-page .logout-btn:hover {
    transform: scale(1.05);
}
    </style>
</head>

<body class="account-page">

<!-- ✅ NAVBAR (UNCHANGED — comes from main.css) -->
<header class="navbar">

    <div class="nav-left">
        <div class="brand">
            <a href="../index.html" class="logo-link">
                <img src="../assets/images/logo.png" class="logo-img">
            </a>
        </div>
    </div>

    <div class="nav-center"></div>

    <div class="nav-right">
        <div class="account">My Account</div>
    </div>

</header>

<div class="account-container">

    <!-- USER INFO -->
    <div class="card">
        <h2><i data-lucide="user"></i> My Details</h2>
        <p id="userName"></p>
        <p id="userEmail"></p>
    </div>

    <!-- FAVORITES -->
    <div class="card">
        <h2><i data-lucide="star"></i> Saved Locations</h2>
        <div id="favoritesList"></div>
    </div>

    <!-- REVIEWS -->
    <div class="card">
        <h2><i data-lucide="edit-3"></i> My Reviews</h2>
        <div id="myReviews"></div>
    </div>

    <!-- LOGOUT -->
    <div class="card">
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>

</div>

<script src="../js/account.js"></script>

<script>
    lucide.createIcons();
</script>

</body>
</html>
