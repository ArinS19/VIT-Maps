<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VITMaps - Login</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-container">
        
        
        <div class="login-image">
            <img src="/assets/images/loginpage.jpg" alt="Login Image">
        </div>

        <div class="login-form">
    <h2 id="formTitle">Login to VITMaps</h2>

    <input type="text" id="name" placeholder="Name" style="display: none;">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button id="submitBtn">Login</button>

    <p id="toggleText">
        Don't have an account? <span id="toggleBtn">Sign up</span>
    </p>
</div>

    </div>
    <script src="js/login.js"></script>
</body>
</html>
