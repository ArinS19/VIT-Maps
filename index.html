<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VITMaps</title>

    <link 
    rel="stylesheet" 
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/map.css">
    <link rel="stylesheet" href="css/cards.css">
</head>
<body>

<header class="navbar">
    <div class="logo">VITMaps</div>
    <div class="account" onclick="window.location.href='pages/account.html'">My Account</div>
</header>

<section class="map-section" id="mapSection">
    <div id="map-container">

        <div id="map-popup" class="map-popup">
            <div class="popup-content">

                <!-- Optional handle -->
                <div class="popup-handle"></div>

                <!-- HEADER -->
                <div class="popup-header">
                    <h2 id="popup-name">Place Name</h2>

                    <div class="popup-actions">
                        <button id="shareBtn">Share</button>
                        <button id="saveBtn">Save</button>
                        <button id="closePopupBtn">X</button>
                    </div>
                </div>

                <!-- BODY -->
                <div class="popup-body">

                    <!-- LEFT -->
                    <div class="popup-left">

                        <p id="popup-type"></p>
                        <p id="popup-rating"></p>
                        <p id="popup-desc"></p>

                        <div id="popup-menu"></div>

                        <!-- 🔥 REVIEWS SECTION -->
                        <div id="reviews-section"></div>

                        <!-- 🔥 ADD REVIEW -->
                        <div id="add-review">
                            <h4>Add Review</h4>

                            <input 
                                type="number" 
                                id="review-rating" 
                                placeholder="Rating (1-5)" 
                                min="1" 
                                max="5"
                            >

                            <input 
                                type="text" 
                                id="review-comment" 
                                placeholder="Write your review"
                            >

                            <button id="submitReview">Submit Review</button>
                        </div>

                    </div>

                    <!-- RIGHT IMAGE -->
                    <div class="popup-right">
                        <img id="popup-image" src="" alt="Place Image">
                    </div>

                </div>

            </div>
        </div>

    </div>
</section>

<!-- CATEGORY CARDS -->
<section class="category-section">
    <h2 class="category-heading">Explore Campus</h2>

    <p class="category-subtext">
        Discover buildings, hostels, food outlets, and facilities across VIT Chennai
    </p>

    <div class="categories">

        <div class="category-wrapper">
            <div class="category-card" data-type="food">
                <span class="card-icon">🍔</span>
                <span class="card-title">Food</span>
            </div>
            <div class="sub-tabs"></div>
        </div>

        <div class="category-wrapper">
            <div class="category-card" data-type="academic">
                <span class="card-icon">🏢</span>
                <span class="card-title">Blocks / Admin</span>
            </div>
            <div class="sub-tabs"></div>
        </div>

        <div class="category-wrapper">
            <div class="category-card" data-type="hostel">
                <span class="card-icon">🏠</span>
                <span class="card-title">Hostels</span>
            </div>
            <div class="sub-tabs"></div>
        </div>

        <div class="category-wrapper">
            <div class="category-card" data-type="sports">
                <span class="card-icon">🏏</span>
                <span class="card-title">Sports Areas</span>
            </div>
            <div class="sub-tabs"></div>
        </div>

        <div class="category-wrapper">
            <div class="category-card" data-type="near-campus">
                <span class="card-icon">📍</span>
                <span class="card-title">Near Campus</span>
            </div>
            <div class="sub-tabs"></div>
        </div>

    </div>
</section>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/map.js"></script>
<script src="js/cards.js"></script>

</body>
</html>
